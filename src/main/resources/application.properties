spring.application.name=UserDirectory

# Shard 0 - Primary (port 5432)
spring.datasource.shard0-primary.jdbc-url=jdbc:postgresql://localhost:5432/user_directory
spring.datasource.shard0-primary.username=admin
spring.datasource.shard0-primary.password=secret
spring.datasource.shard0-primary.driver-class-name=org.postgresql.Driver
spring.datasource.shard0-primary.pool-name=shard0-primary

# Shard 0 - Replica (port 5433 for read-only analytics)
spring.datasource.shard0-replica.jdbc-url=jdbc:postgresql://localhost:5433/user_directory
spring.datasource.shard0-replica.username=admin
spring.datasource.shard0-replica.password=secret
spring.datasource.shard0-replica.driver-class-name=org.postgresql.Driver
spring.datasource.shard0-replica.pool-name=shard0-replica
spring.datasource.shard0-replica.read-only=true

# Shard 1 - Primary (port 5433)
spring.datasource.shard1-primary.jdbc-url=jdbc:postgresql://localhost:5433/user_directory
spring.datasource.shard1-primary.username=admin
spring.datasource.shard1-primary.password=secret
spring.datasource.shard1-primary.driver-class-name=org.postgresql.Driver
spring.datasource.shard1-primary.pool-name=shard1-primary

# Shard 1 - Replica (port 5433 for read-only analytics)
spring.datasource.shard1-replica.jdbc-url=jdbc:postgresql://localhost:5433/user_directory
spring.datasource.shard1-replica.username=admin
spring.datasource.shard1-replica.password=secret
spring.datasource.shard1-replica.driver-class-name=org.postgresql.Driver
spring.datasource.shard1-replica.pool-name=shard1-replica
spring.datasource.shard1-replica.read-only=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging for datasource routing
logging.level.com.martin.userdirectory.sharding=DEBUG